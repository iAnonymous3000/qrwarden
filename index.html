<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Scan and inspect QR codes on your device before you act.">
    <meta name="theme-color" content="#191715" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#fffdf8" media="(prefers-color-scheme: light)">
    <meta name="color-scheme" content="dark light">
    <link rel="manifest" href="/app.webmanifest">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png">
    <title>QRWarden: Scan. Inspect. Decide.</title>
  </head>
  <body>
    <noscript>
      <div class="noscript-fallback">
        <h1>QRWarden needs JavaScript</h1>
        <p>
          QRWarden inspects QR codes entirely on this device. The decoding and
          analysis run as JavaScript in your browser, and no data leaves it.
          That also means nothing can run while JavaScript is disabled.
        </p>
        <p>
          To use QRWarden, enable JavaScript for this site and reload the
          page. The app makes no network requests during analysis either way.
        </p>
      </div>
    </noscript>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
