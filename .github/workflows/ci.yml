name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out the exact revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install the locked Node runtime
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install the locked npm runtime
        run: npm install --global --ignore-scripts npm@11.16.0

      - name: Install from the lockfile
        run: npm ci --ignore-scripts=false --strict-allow-scripts

      - name: Validate source and unit/integration contracts
        run: npm run validate

      - name: Build and verify the closed production artifact
        run: npm run build

      - name: Verify local byte reproducibility
        run: npm run verify:reproducible

  browser:
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out the exact revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install the locked Node runtime
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install the locked npm runtime
        run: npm install --global --ignore-scripts npm@11.16.0

      - name: Install from the lockfile
        run: npm ci --ignore-scripts=false --strict-allow-scripts

      - name: Install pinned Playwright browser binaries
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run production-serving browser checks
        run: npm run test:browser
